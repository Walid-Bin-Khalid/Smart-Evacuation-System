name: smart_evacuation_system

description: "Smart Indoor Emergency Evacuation System"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Internet Connectivity:
  connectivity_plus: ^6.0.3

  # GPS & Location:
  geolocator: ^12.0.0

  # Date & Time:
  intl: ^0.19.0

  # Profile Image Picker:
  image_picker: ^1.1.2

  # Permissions:
  permission_handler: ^11.3.1

  # Local Storage:
  shared_preferences: ^2.2.2

  # JSON Parsing:
  collection: ^1.18.0

  # AR-CORE:
  ar_flutter_plugin_2: ^0.0.3
  vector_math: ^2.1.4
  
  # Allow to fetch data from Mob Sensors
  sensors_plus: ^4.0.2
  http: ^1.6.0

  web_socket_channel: ^3.0.1  

  dio: ^5.4.0

  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.13.1

flutter:

  uses-material-design: true

  assets:
    - assets/building_graph.json
    - assets/images/app_icon.png   
    # - models/arrow.glb             
    # - models/exit_marker.glb       

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"







